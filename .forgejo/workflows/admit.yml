# admit.yml — Forgejo Actions: fail-closed admission gate for a Tofu substrate star.
#
# Baked born-with by copier (the constellation SG5 canonical gate, adapted for a
# repo with NO Python env — the constellation gate runs via `uv run --no-project
# --with constellation`). A star cannot merge without passing every check here.
#
# Gate sequence (each step fails the job on non-zero exit — fail-closed):
#   1. checkout · 2. install tools (uv, conftest, cosign, syft, oras)
#   3. pull+verify the pinned policy bundle (cosign verify + oras pull)
#   4. supply-chain (cosign image verify + syft SBOM)
#   5. build admission-input.json via constellation.gate (also the fail-closed
#      interstellar-registry gate) · 6. conftest test admission-input.json
#
# Tool versions: pinned in .forgejo/versions.env (the fleet SoT shape — the
# signer and verifier load the same file, so cosign can never drift v2/v3).
# constellation pin: bump CONSTELLATION_REF when a new governance release lands.

name: admit

on:
  pull_request:

env:
  REGISTRY: ${{ vars.REGISTRY || 'forgejo.notusmi.com' }}
  CONSTELLATION_REF: "constellation @ git+http://100.93.64.106:8215/constellation.git"
  # The --no-project uv runs below need >=3.11 (tomllib); the act image's
  # system python is 3.10. Pin a uv-managed interpreter for every step.
  UV_PYTHON: "3.12"

jobs:
  gate:
    name: Admission gate
    runs-on: nas01
    container:
      image: catthehacker/ubuntu:act-22.04@sha256:aeaa74e62723c9538ed865e2de82617bb8c2e2c84ef36f8ba150a9dbb7ad39a3
    # The runner's default `run` shell is sh (dash), which rejects
    # `set -o pipefail` — every step here assumes bash. Born-with defect in
    # the copier tofu-substrate variant; fix upstream in tofu-repo-template.
    defaults:
      run:
        shell: bash
    steps:
      - uses: https://forgejo.notusmi.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # KEY=VALUE lines are exported; comments/blanks are skipped so the
      # $GITHUB_ENV parser never chokes.
      - name: Load tool versions
        run: grep -E '^[A-Z_]+=' .forgejo/versions.env >> "$GITHUB_ENV"

      - name: Install uv
        env:
          UV_INSTALL_DIR: /usr/local/bin
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install conftest
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" conftest
          install -m 0755 conftest /usr/local/bin/conftest
          conftest --version

      - name: Install cosign
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          install -m 0755 cosign-linux-amd64 /usr/local/bin/cosign
          cosign version

      - name: Install syft
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          install -m 0755 syft /usr/local/bin/syft
          syft version

      - name: Install oras
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin oras
          oras version

      # The furnace/policy package (and any image ref) requires an authenticated
      # registry read — oras login writes ~/.docker/config.json, which cosign,
      # oras, and syft all resolve.
      - name: Registry login
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          printf %s "${REGISTRY_TOKEN}" | oras login "${REGISTRY}" -u rob --password-stdin

      - name: Pull and verify policy bundle
        run: |
          set -euo pipefail
          # tomllib is stdlib — no project env or extra deps needed.
          BUNDLE=$(uv run --no-project python -c "
          import tomllib, sys
          data = tomllib.loads(open('star.toml').read())
          g = data.get('governance')
          if not g:
              print('ERROR: star.toml has no [governance] block — bundle pin required', file=sys.stderr)
              sys.exit(1)
          print(g['bundle'].removeprefix('oci://'))
          ")
          TAG=$(uv run --no-project python -c "
          import tomllib
          print(tomllib.loads(open('star.toml').read())['governance']['tag'])
          ")
          DIGEST=$(uv run --no-project python -c "
          import tomllib, sys
          d = tomllib.loads(open('star.toml').read())['governance'].get('digest', '')
          if not d:
              print('ERROR: star.toml [governance].digest is required for verification', file=sys.stderr)
              sys.exit(1)
          print(d)
          ")
          FULL_REF="${BUNDLE}:${TAG}@${DIGEST}"
          echo "Verifying bundle: ${FULL_REF}"
          # Keyed verification — the fleet signs with the constellation cosign
          # key (cosign.pub committed at repo root); the old keyless form can
          # never match a keyed signature.
          cosign verify --key cosign.pub "${FULL_REF}"
          echo "Pulling bundle to policy/"
          oras pull "${FULL_REF}" --output policy/

      - name: Supply-chain attestation
        run: |
          set -euo pipefail
          IMAGE_SIGNED="false"
          SBOM_PRESENT="false"
          IMAGE_REF=$(uv run --no-project python -c "
          import tomllib
          data = tomllib.loads(open('star.toml').read())
          print(data.get('image', {}).get('ref', ''))
          " 2>/dev/null || true)
          if [ -n "${IMAGE_REF}" ]; then
            if cosign verify --key cosign.pub "${IMAGE_REF}" 2>/dev/null; then
              IMAGE_SIGNED="true"
            fi
            if syft "${IMAGE_REF}" -o spdx-json --file sbom.spdx.json 2>/dev/null; then
              SBOM_PRESENT="true"
            fi
          else
            echo "No image ref in star.toml — supply-chain not attested (IMAGE_SIGNED=false)"
          fi
          echo "IMAGE_SIGNED=${IMAGE_SIGNED}" >> "${GITHUB_ENV}"
          echo "SBOM_PRESENT=${SBOM_PRESENT}" >> "${GITHUB_ENV}"

      - name: Build admission input
        run: |
          set -euo pipefail
          MIGRATIONS_FLAG=""
          if [ -d migrations ]; then
            uv run --no-project python -c "
          import json, pathlib
          migs = [{'file': f.name, 'namespace': ''} for f in sorted(pathlib.Path('migrations').iterdir()) if f.is_file()]
          print(json.dumps(migs))
          " > migrations-list.json
            MIGRATIONS_FLAG="--migrations migrations-list.json"
          fi
          uv run --no-project --with "${CONSTELLATION_REF}" python -m constellation.gate \
            --star-toml star.toml \
            ${MIGRATIONS_FLAG} \
            --image-signed "${IMAGE_SIGNED}" \
            --sbom-present "${SBOM_PRESENT}" \
            --out admission-input.json

      - name: Conftest policy evaluation
        run: |
          set -euo pipefail
          conftest test admission-input.json -p policy
