# Grafana dashboard provider — loads JSON dashboards from disk (provisioned-as-code,
# never hand-built). The fleet overview lands in a "Constellation" folder.
apiVersion: 1

providers:
  - name: hemera
    orgId: 1
    folder: Constellation
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
