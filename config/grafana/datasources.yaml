# Grafana datasources — provisioned-as-code. Resolve the three backends by their
# container names on hemera-net. Tempo <-> Loki <-> Prometheus correlation wired
# so a trace links to its logs and span metrics.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: hemera-prometheus
    access: proxy
    url: http://hemera-prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    uid: hemera-loki
    access: proxy
    url: http://hemera-loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: hemera-tempo

  - name: Tempo
    type: tempo
    uid: hemera-tempo
    access: proxy
    url: http://hemera-tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: hemera-loki
      serviceMap:
        datasourceUid: hemera-prometheus
