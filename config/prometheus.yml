# Hemera Prometheus — the metrics store. Fleet metrics arrive via the collector's
# remote-write (--web.enable-remote-write-receiver); we additionally scrape the
# collector's own telemetry (:8888) and Prometheus itself for self-observability.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    plane: hemera

# Aether (postgres-postgres-1) SPOF alerting — evaluated here; visible in /alerts
# + Grafana. Delivery (Alertmanager / contact point) is a follow-up.
rule_files:
  - /etc/prometheus/rules/aether.yml
  - /etc/prometheus/rules/signed-state.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["hemera-otelcol:8888"]

  # Forgejo Actions runner-queue depth. Forgejo's own /metrics exposes no
  # actions/runner series, so the forgejo-ci-exporter sidecar (a Dockge stack at
  # /opt/stacks/forgejo-ci-exporter on the forgejo + hemera-net nets) polls the
  # admin Actions API and exports queue depth by status.
  - job_name: forgejo-ci-exporter
    static_configs:
      - targets: ["forgejo-ci-exporter:9110"]
