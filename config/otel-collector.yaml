# Hemera OTel Collector — the constellation's single OTLP ingest point.
# Receives traces/metrics/logs from every star and fans each to its backend.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Aether (postgres-postgres-1) — the shared relational substrate, a SPOF now
  # (10 star DBs + phdb + tofu state on one instance). Scraped read-only via the
  # hemera_monitor role (pg_monitor). Reachable east-west on pantheon.
  postgresql:
    endpoint: postgres-postgres-1:5432
    transport: tcp
    username: hemera_monitor
    password: ${env:AETHER_MONITOR_PASSWORD}
    databases: [] # all non-template databases
    collection_interval: 30s
    tls:
      insecure: true

  # nas01 host disk / IO / memory — the ZFS write-storm that triggered the DB
  # consolidation was a HOST disk event Postgres metrics can't see. root_path is
  # the read-only host mount (see main.tf: / -> /hostfs).
  hostmetrics:
    root_path: /hostfs
    collection_interval: 30s
    scrapers:
      cpu:
      load:
      memory:
      disk:
      filesystem:
      paging:

processors:
  # Bound memory before it bites; batch before export.
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    timeout: 10s

exporters:
  # metrics -> Prometheus (remote-write receiver enabled on the Prometheus side)
  prometheusremotewrite:
    endpoint: http://hemera-prometheus:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true

  # logs -> Loki native OTLP endpoint (exporter appends /v1/logs -> /otlp/v1/logs)
  otlphttp/loki:
    endpoint: http://hemera-loki:3100/otlp

  # traces -> Tempo OTLP gRPC
  otlp/tempo:
    endpoint: http://hemera-tempo:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      level: detailed
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [otlp, postgresql, hostmetrics]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
